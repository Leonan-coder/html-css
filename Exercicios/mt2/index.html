<style>
    a{
        text-decoration: none;
    }
    a:visited {
        color: black;
        text-decoration: underline;
    }
    a:hover {
        color: green;
        text-decoration: underline;
    }

    a:active {
        color: brown;
        text-decoration: none;
    }

    a::before {
        content: "youtube";
        text-decoration: none;
    }
</style>
