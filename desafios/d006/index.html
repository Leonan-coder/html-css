<body>
  <h1>Tags em HTML</h1>

  <ul>
    <li><abbr title="Use <p> para criar um páragrafo">Páragrafo</abbr></li>

    <li><abbr title="use a tag <abbr> para fazer uma abreviação">Abreviações</abbr></li>

  </ul>
